<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Języki Teatru – Niezbędnik Młodego Widza</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    color: #fff;
  }

  /* Full-screen page viewer */
  #viewer {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: grab;
  }
  #viewer.dragging { cursor: grabbing; }

  #pageWrap {
    position: relative;
    transition: transform 0.08s ease-out;
    transform-origin: center center;
    will-change: transform;
  }

  #pageImg {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Flip animation overlay */
  #flipOverlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flip-card {
    position: absolute;
    width: 0;
    height: 100%;
    overflow: hidden;
    background: #fff;
  }

  /* UI Controls — bottom toolbar */
  #toolbar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(30,30,30,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 40px;
    padding: 6px 10px;
    z-index: 200;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .tb-btn {
    background: none;
    border: none;
    color: #ccc;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .tb-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .tb-btn:disabled { opacity: 0.3; cursor: default; }
  .tb-btn:disabled:hover { background: none; color: #ccc; }

  .tb-sep {
    width: 1px;
    height: 22px;
    background: rgba(255,255,255,0.15);
    margin: 0 2px;
  }

  #pageNum {
    font-size: 13px;
    color: #bbb;
    min-width: 72px;
    text-align: center;
    letter-spacing: 0.01em;
  }

  #zoomLevel {
    font-size: 12px;
    color: #bbb;
    min-width: 38px;
    text-align: center;
  }

  .dl-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #ccc;
    text-decoration: none;
    font-size: 13px;
    padding: 0 10px;
    height: 36px;
    border-radius: 40px;
    transition: background 0.12s, color 0.12s;
  }
  .dl-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* Nav hit areas — left/right thirds of screen */
  #navLeft, #navRight {
    position: fixed;
    top: 0;
    bottom: 80px;
    width: 20%;
    z-index: 100;
    cursor: pointer;
  }
  #navLeft { left: 0; }
  #navRight { right: 0; }

  /* Thumbnails panel */
  #thumbPanel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 120px;
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(8px);
    border-left: 1px solid rgba(255,255,255,0.08);
    overflow-y: auto;
    z-index: 150;
    padding: 12px 10px;
    display: none;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: #444 transparent;
  }
  #thumbPanel.open { display: flex; }

  .thumb {
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }
  .thumb.active { border-color: #fff; }
  .thumb img { width: 100%; display: block; }
  .thumb-num {
    text-align: center;
    font-size: 10px;
    color: #666;
    padding: 2px 0;
  }
</style>
</head>
<body>

<div id="viewer">
  <div id="pageWrap">
    <img id="pageImg" src="" alt="Strona">
  </div>
</div>

<div id="flipOverlay"></div>
<div id="navLeft" onclick="goPrev()"></div>
<div id="navRight" onclick="goNext()"></div>

<div id="thumbPanel"></div>

<div id="toolbar">
  <!-- Prev -->
  <button class="tb-btn" id="btnPrev" onclick="goPrev()" title="Poprzednia (←)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <span id="pageNum">1 / 26</span>

  <!-- Next -->
  <button class="tb-btn" id="btnNext" onclick="goNext()" title="Następna (→)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Zoom out -->
  <button class="tb-btn" id="btnZoomOut" onclick="zoom(-0.25)" title="Pomniejsz (-)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>

  <button class="tb-btn" id="btnZoomReset" onclick="zoomReset()" title="Dopasuj do ekranu">
    <span id="zoomLevel">100%</span>
  </button>

  <!-- Zoom in -->
  <button class="tb-btn" id="btnZoomIn" onclick="zoom(0.25)" title="Powiększ (+)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Thumbnails toggle -->
  <button class="tb-btn" id="btnThumbs" onclick="toggleThumbs()" title="Miniatury">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Download -->
  <a class="dl-btn" href="Jezyki teatru. Niezbednik Mlodego Widza.pdf" download title="Pobierz PDF">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    PDF
  </a>
</div>

<script>
  const TOTAL = 26;
  const pages = Array.from({length: TOTAL}, (_, i) => `pages/page-${String(i+1).padStart(2,'0')}.png`);

  let current = 0;
  let scale = 1;
  let panX = 0, panY = 0;
  let isAnimating = false;
  let thumbsOpen = false;

  const viewer = document.getElementById('viewer');
  const pageWrap = document.getElementById('pageWrap');
  const pageImg = document.getElementById('pageImg');
  const pageNum = document.getElementById('pageNum');
  const zoomLevel = document.getElementById('zoomLevel');

  // --- Rendering ---
  function setPage(idx, direction) {
    if (idx < 0 || idx >= TOTAL || isAnimating) return;

    const oldImg = pageImg.src;

    if (direction && current !== idx) {
      animateFlip(direction, () => {
        current = idx;
        panX = 0; panY = 0;
        applyTransform();
        pageImg.src = pages[current];
        updateUI();
      });
    } else {
      current = idx;
      panX = 0; panY = 0;
      applyTransform();
      pageImg.src = pages[current];
      updateUI();
    }
  }

  function updateUI() {
    pageNum.textContent = `${current + 1} / ${TOTAL}`;
    zoomLevel.textContent = Math.round(scale * 100) + '%';
    document.getElementById('btnPrev').disabled = current === 0;
    document.getElementById('btnNext').disabled = current === TOTAL - 1;
    updateThumbActive();
  }

  function applyTransform() {
    pageWrap.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  }

  // --- Navigation ---
  function goNext() { setPage(current + 1, 'next'); }
  function goPrev() { setPage(current - 1, 'prev'); }

  // --- Flip animation ---
  function animateFlip(direction, callback) {
    isAnimating = true;
    const overlay = document.getElementById('flipOverlay');

    // Capture current page as a temporary canvas snapshot feel — just animate a sliding curtain
    const curtain = document.createElement('div');
    curtain.style.cssText = `
      position: absolute;
      top: 0; bottom: 0;
      width: 0;
      background: linear-gradient(${direction === 'next' ? 'to left' : 'to right'}, rgba(0,0,0,0.18), transparent);
      ${direction === 'next' ? 'right: 0' : 'left: 0'};
      transition: width 0.35s ease-in-out;
    `;
    overlay.appendChild(curtain);

    requestAnimationFrame(() => {
      curtain.style.width = '60vw';
      setTimeout(() => {
        callback();
        curtain.style.width = '0';
        setTimeout(() => {
          overlay.removeChild(curtain);
          isAnimating = false;
        }, 350);
      }, 200);
    });
  }

  // --- Zoom ---
  function zoom(delta) {
    scale = Math.min(4, Math.max(0.3, scale + delta));
    applyTransform();
    zoomLevel.textContent = Math.round(scale * 100) + '%';
  }

  function zoomReset() {
    scale = 1; panX = 0; panY = 0;
    applyTransform();
    zoomLevel.textContent = '100%';
  }

  // Pinch-to-zoom
  let lastDist = 0;
  viewer.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, {passive: true});

  viewer.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const delta = (dist - lastDist) * 0.005;
      lastDist = dist;
      scale = Math.min(4, Math.max(0.3, scale + delta));
      applyTransform();
      zoomLevel.textContent = Math.round(scale * 100) + '%';
      e.preventDefault();
    }
  }, {passive: false});

  // Mouse wheel zoom
  viewer.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    scale = Math.min(4, Math.max(0.3, scale + delta));
    applyTransform();
    zoomLevel.textContent = Math.round(scale * 100) + '%';
  }, {passive: false});

  // --- Pan (drag) ---
  let isDragging = false;
  let dragStartX, dragStartY, panStartX, panStartY;

  viewer.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    panStartX = panX;
    panStartY = panY;
    viewer.classList.add('dragging');
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
    applyTransform();
  });

  window.addEventListener('mouseup', e => {
    if (!isDragging) return;
    isDragging = false;
    viewer.classList.remove('dragging');
    // If barely moved, treat as click navigation
    const moved = Math.abs(e.clientX - dragStartX) + Math.abs(e.clientY - dragStartY);
    if (moved < 5 && scale === 1) {
      const half = window.innerWidth / 2;
      if (e.clientX > half) goNext(); else goPrev();
    }
  });

  // Touch pan
  let touchStartX, touchStartY, panStartTX, panStartTY;
  viewer.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      panStartTX = panX;
      panStartTY = panY;
    }
  }, {passive: true});

  viewer.addEventListener('touchend', e => {
    if (e.changedTouches.length === 1 && scale <= 1) {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) goNext(); else goPrev();
      }
    }
  }, {passive: true});

  // --- Keyboard ---
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') goNext();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') goPrev();
    if (e.key === '+' || e.key === '=') zoom(0.25);
    if (e.key === '-') zoom(-0.25);
    if (e.key === '0') zoomReset();
  });

  // --- Thumbnails ---
  function buildThumbs() {
    const panel = document.getElementById('thumbPanel');
    pages.forEach((src, i) => {
      const wrap = document.createElement('div');
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      thumb.id = `t${i}`;
      const img = document.createElement('img');
      img.src = src;
      img.loading = 'lazy';
      thumb.appendChild(img);
      thumb.addEventListener('click', () => { setPage(i); });
      const num = document.createElement('div');
      num.className = 'thumb-num';
      num.textContent = i + 1;
      wrap.appendChild(thumb);
      wrap.appendChild(num);
      panel.appendChild(wrap);
    });
  }

  function updateThumbActive() {
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    const el = document.getElementById(`t${current}`);
    if (el) { el.classList.add('active'); el.scrollIntoView({behavior: 'smooth', block: 'nearest'}); }
  }

  function toggleThumbs() {
    thumbsOpen = !thumbsOpen;
    document.getElementById('thumbPanel').classList.toggle('open', thumbsOpen);
    document.getElementById('btnThumbs').style.color = thumbsOpen ? '#fff' : '';
  }

  // Init
  buildThumbs();
  pageImg.src = pages[0];
  updateUI();
</script>
</body>
</html>
